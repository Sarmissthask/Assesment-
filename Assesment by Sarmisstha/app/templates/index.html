<!DOCTYPE html>
<html>
<head>
  <title>Recipes</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h2>Recipe List</h2>

<table id="recipeTable">
  <thead>
    <tr>
      <th class="truncate">Title</th>
      <th>Cuisine</th>
      <th>Rating</th>
      <th>Total Time</th>
      <th>No. of People serves</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Right Drawer -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <h3 id="drawerTitle"></h3>
    <span id="drawerCuisine"></span>
    <button onclick="closeDrawer()">X</button>
  </div>

  <div class="drawer-body">
    <p><strong>Description:</strong> <span id="drawerDesc"></span></p>

    <p>
      <strong>Total Time:</strong>
      <span id="drawerTotal"></span>
      <button onclick="toggleTime()">+</button>
    </p>

    <div id="timeDetails" class="hidden">
      <p><strong>Cook Time:</strong> <span id="drawerCook"></span></p>
      <p><strong>Prep Time:</strong> <span id="drawerPrep"></span></p>
    </div>

    <h4>Nutrition</h4>
    <table class="nutrition">
      <tbody id="nutritionBody"></tbody>
    </table>
  </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
